<!-- Dán code web vào đây -->
<script>
    const SHEET_API_URL = "https://script.google.com/macros/s/AKfycby_xJujI0KTZABafj5ikfgG74CdUeSqNYNHYcBb4VeymeJdBxk10BeK2xMa5qq5AdaR/exec";
    
    // Hàm này sẽ tự động lấy dữ liệu từ 3 Tab của bạn:
    function loadDataFromGoogleSheet() {
        fetch(SHEET_API_URL)
        .then(res => res.json())
        .then(data => {
            // 1. Vẽ checklist từ tab Nhiệm vụ
            buildDynamicChecklist(data.tasks);
            // 2. Load tài nguyên từ tab Tài nguyên
            resources = data.resources;
            renderResources();
            // 3. Load ghi chú từ tab Ghi chú lịch
            data.notes.forEach(n => calendarNotes[n.date] = n.note);
            renderCalendarSection();
        });
    }
    // ... (Phần logic còn lại giữ nguyên như tôi đã gửi ở tin nhắn trước)
</script>
