<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>🌸 HY HY FULL WORKSPACE 2026 🌸</title>
    <style>
        :root { --bg-color: #FFF5F5; --sakura-pink: #FFB7B2; --sakura-dark: #FF8B94; }
        body { font-family: sans-serif; background-color: var(--bg-color); padding: 20px; }
        .card { background: #fff; border: 3px solid #000; border-radius: 20px; padding: 15px; margin-bottom: 20px; }
        .grid-days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        .cal-btn { padding: 10px; border: 2px solid #000; border-radius: 10px; background: #fff; cursor: pointer; position: relative; }
        /* Hiệu ứng rê chuột hiện ghi chú */
        .cal-btn:hover::after { content: attr(data-note); position: absolute; bottom: 110%; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 5px; border-radius: 5px; font-size: 10px; width: 120px; text-align: center; }
        .res-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .res-table td { border: 1px solid #000; padding: 8px; }
        button { cursor: pointer; background: var(--sakura-pink); border: 2px solid #000; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <h2>🌸 LỊCH TRỰC QUAN & GHI CHÚ</h2>
        <div id="calendar-grid" class="grid-days"></div>
        <p><small>* Bấm vào ngày để nhập ghi chú - Rê chuột để xem ghi chú</small></p>
    </div>

    <div class="card">
        <h2>💡 KHO TÀI NGUYÊN (Tự nhận diện Cre)</h2>
        <input type="text" id="link-input" placeholder="Dán link bài gốc..." style="width:70%; padding:8px;">
        <button onclick="addResource()">Lưu & Tự nhận diện</button>
        <table class="res-table" id="res-table"></table>
    </div>

<script>
    // Khởi tạo dữ liệu
    let db = JSON.parse(localStorage.getItem('hy_full_db')) || { notes: {}, resources: [] };

    function save() { localStorage.setItem('hy_full_db', JSON.stringify(db)); }

    // 1. Render Lịch
    function renderCalendar() {
        const grid = document.getElementById('calendar-grid');
        grid.innerHTML = '';
        for(let i=1; i<=30; i++) {
            let key = "2026-06-" + i;
            let btn = document.createElement('div');
            btn.className = 'cal-btn';
            btn.innerText = i;
            btn.setAttribute('data-note', db.notes[key] || "Trống");
            btn.onclick = () => {
                let note = prompt("Nhập ghi chú cho ngày " + i, db.notes[key] || "");
                if(note !== null) { db.notes[key] = note; btn.setAttribute('data-note', note); save(); }
            };
            grid.appendChild(btn);
        }
    }

    // 2. Tự động nhận diện & Format "Cre: @Tên"
    function addResource() {
        let url = document.getElementById('link-input').value;
        if(!url) return;
        
        let platform = "Web", user = "Unknown";
        if(url.includes('tiktok')) { platform = 'TikTok'; user = '@' + url.split('/')[3]; }
        else if(url.includes('x.com')) { platform = 'X'; user = '@' + url.split('/')[3]; }
        else if(url.includes('instagram')) { platform = 'Instagram'; user = '@' + url.split('/')[3]; }
        
        db.resources.push({ platform, user, cre: `Cre: ${user}` });
        save();
        renderResources();
        document.getElementById('link-input').value = '';
    }

    function renderResources() {
        let table = document.getElementById('res-table');
        table.innerHTML = `<tr><th>Nền tảng</th><th>Tài khoản</th><th>Hành động</th></tr>`;
        db.resources.forEach((r) => {
            table.innerHTML += `<tr><td>${r.platform}</td><td>${r.user}</td>
            <td><button onclick="navigator.clipboard.writeText('${r.cre}'); alert('Đã copy: ${r.cre}')">Copy ${r.cre}</button></td></tr>`;
        });
    }

    renderCalendar();
    renderResources();
</script>
</body>
</html>
