<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌸 HY HY FULL WORKSPACE 2026 🌸</title>
    <style>
        :root { --bg-color: #FFF5F5; --sakura-pink: #FFB7B2; --sakura-dark: #FF8B94; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); margin: 0; padding: 20px; }
        .card { background: #fff; border: 3px solid #000; border-radius: 20px; padding: 20px; margin-bottom: 20px; box-shadow: 4px 4px 0 #000; }
        .grid-days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; margin-top: 10px; }
        .cal-btn { padding: 15px 5px; border: 2px solid #000; border-radius: 10px; background: #FFF0F0; cursor: pointer; position: relative; text-align: center; font-weight: bold; }
        .cal-btn:hover::after { content: attr(data-note); position: absolute; bottom: 110%; left: 50%; transform: translateX(-50%); background: #000; color: #fff; padding: 5px; border-radius: 5px; font-size: 11px; width: 120px; z-index: 10; }
        .res-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .res-table th, .res-table td { border: 2px solid #000; padding: 10px; text-align: center; }
        input { padding: 10px; border: 2px solid #000; border-radius: 10px; width: 60%; }
        button { padding: 10px 20px; border: 2px solid #000; border-radius: 10px; font-weight: bold; cursor: pointer; background: var(--sakura-pink); }
    </style>
</head>
<body>

    <div class="card">
        <h1>🌸 LỊCH & GHI CHÚ 2026</h1>
        <p><small>Bấm vào ngày để Ghi chú - Rê chuột để Xem</small></p>
        <div id="calendar-grid" class="grid-days"></div>
    </div>

    <div class="card">
        <h1>💡 KHO TÀI NGUYÊN (Copy Cre)</h1>
        <input type="text" id="link-input" placeholder="Dán link (TikTok/X/Ins)...">
        <button onclick="addResource()">Lưu & Nhận diện</button>
        <table class="res-table" id="res-table">
            <thead><tr><th>Nền tảng</th><th>Tên</th><th>Copy Cre</th></tr></thead>
            <tbody id="res-body"></tbody>
        </table>
    </div>

<script>
    // Khởi tạo data
    let db = JSON.parse(localStorage.getItem('hy_final_data')) || { notes: {}, resources: [] };
    function save() { localStorage.setItem('hy_final_data', JSON.stringify(db)); }

    // Logic Lịch
    function renderCalendar() {
        const grid = document.getElementById('calendar-grid');
        grid.innerHTML = '';
        for(let i=1; i<=30; i++) {
            let key = "2026-06-" + i;
            let btn = document.createElement('div');
            btn.className = 'cal-btn';
            btn.innerText = i;
            btn.setAttribute('data-note', db.notes[key] || "Trống");
            btn.onclick = () => {
                let val = prompt("Ghi chú cho ngày " + i + ":", db.notes[key] || "");
                if(val !== null) { db.notes[key] = val; btn.setAttribute('data-note', val); save(); }
            };
            grid.appendChild(btn);
        }
    }

    // Logic Nhận diện Link
    function addResource() {
        let url = document.getElementById('link-input').value;
        if(!url) return;
        let plat = "Web", user = "Unknown";
        if(url.includes('tiktok')) { plat = 'TikTok'; user = '@' + url.split('/')[3].replace('@',''); }
        else if(url.includes('x.com')) { plat = 'X'; user = '@' + url.split('/')[3]; }
        else if(url.includes('instagram')) { plat = 'Instagram'; user = '@' + url.split('/')[3]; }
        
        db.resources.push({ plat, user, cre: `Cre: ${user}` });
        save();
        renderResources();
        document.getElementById('link-input').value = '';
    }

    function renderResources() {
        let tbody = document.getElementById('res-body');
        tbody.innerHTML = '';
        db.resources.forEach((r, idx) => {
            tbody.innerHTML += `<tr><td>${r.plat}</td><td>${r.user}</td>
            <td><button onclick="navigator.clipboard.writeText('${r.cre}'); alert('Đã copy: ${r.cre}')">Copy Cre</button></td></tr>`;
        });
    }

    renderCalendar();
    renderResources();
</script>
</body>
</html>
