<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>🌸 HY HY WORKSPACE 2026 🌸</title>
</head>
<body>
    <div id="loading" style="text-align:center; padding:50px; font-size:20px;">Đang khởi động công việc...</div>
    
    <script>
        // DÁN LINK /EXEC CỦA BẠN VÀO DƯỚI ĐÂY
        const SHEET_API_URL = "https://script.google.com/macros/s/AKfycby_xJujI0KTZABafj5ikfgG74CdUeSqNYNHYcBb4VeymeJdBxk10BeK2xMa5qq5AdaR/exec"; 

        async function init() {
            try {
                const response = await fetch(SHEET_API_URL);
                const data = await response.json();
                
                document.getElementById('loading').style.display = 'none';
                console.log("Dữ liệu kết nối thành công:", data);
                alert("Kết nối thành công! Web đã nhận dữ liệu từ Sheet.");
                
                // Nếu đến đây mà hiện Alert, nghĩa là link bạn đã chuẩn!
                // Giờ chỉ cần dán phần giao diện cũ vào sau body là xong.
                
            } catch (error) {
                document.getElementById('loading').innerText = "Lỗi kết nối: " + error.message;
            }
        }
        init();
    </script>
</body>
</html>
