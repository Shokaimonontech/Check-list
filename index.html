<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>🌸 HY HY WORKSPACE 2026 🌸</title>
</head>
<body>
    <div id="status" style="text-align:center; padding:50px;">Đang tải dữ liệu từ Sheet...</div>
    <div id="main-content" style="display:none;">
        <!-- Dán nội dung HTML cũ của bạn vào đây -->
    </div>

<script>
    const SHEET_API_URL = "Dhttps://script.google.com/macros/s/AKfycby_xJujI0KTZABafj5ikfgG74CdUeSqNYNHYcBb4VeymeJdBxk10BeK2xMa5qq5AdaR/exec";

    // HÀM KẾT NỐI CHÍNH
    async function loadData() {
        try {
            const res = await fetch(SHEET_API_URL);
            const data = await res.json();
            document.getElementById('status').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            
            // Xử lý dữ liệu tại đây
            console.log("Dữ liệu nhận được:", data);
        } catch(err) {
            document.getElementById('status').innerText = "Lỗi kết nối Sheet! Hãy kiểm tra link /exec trong code.";
            console.error(err);
        }
    }
    loadData();
</script>
</body>
</html>
