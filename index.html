<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌸 HY HY WORKSPACE 2026 🌸</title>
    <!-- CSS nguyên bản của em -->
    <style>
        :root { --bg-color: #FFF5F5; --text-color: #000000; --sakura-pink: #FFB7B2; --sakura-dark: #FF8B94; --zalo-color: #0068FF; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 0; display: flex; }
        .main-content { flex: 1; max-width: 900px; margin: 0 auto; padding: 20px; padding-top: 75px; }
        .card { background: #fff; border: 3px solid #000; border-radius: 22px; padding: 15px; margin-bottom: 20px; box-shadow: 4px 4px 0 #000; }
        .note-container { background: #fff; border: 2px solid #000; border-radius: 15px; padding: 15px; margin-bottom: 20px; box-shadow: 0 4px 0 #000; }
        #daily-note { width: 100%; height: 70px; border: 2px dashed var(--sakura-pink); border-radius: 8px; padding: 10px; font-family: inherit; }
        .cal-btn { padding: 10px; background: #fff; border: 2px solid #ccc; border-radius: 10px; cursor: pointer; position: relative; }
        .cal-btn.has-note::after { content: '📌'; position: absolute; top: 2px; right: 2px; font-size: 0.7rem; }
        .cal-btn.active { background: var(--sakura-dark); color: #fff; }
        .custom-tooltip { display: none; position: absolute; background: #333; color: #fff; padding: 8px; border-radius: 5px; font-size: 0.8rem; z-index: 9999; pointer-events: none; }
        .remote-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .remote-table th, .remote-table td { border: 2px solid #000; padding: 8px; font-size: 0.85rem; }
        .btn-copy-mini { background: #ffe066; border: 1px solid #000; cursor: pointer; padding: 3px 6px; }
    </style>
</head>
<body>
    <div id="sakura-tooltip" class="custom-tooltip"></div>
    <div class="main-content">
        <h1>🌸 HY HY WORKSPACE 2026 🌸</h1>
        
        <!-- Sổ tay ghi chú -->
        <div class="note-container">
            <div style="font-weight:bold; color:#d63384;">📝 Sổ tay ngày: <span id="note-date-text"></span></div>
            <textarea id="daily-note" placeholder="Nhập ghi chú..." onblur="saveDailyNote()"></textarea>
        </div>

        <!-- Lịch -->
        <div id="calendar-grid" style="display:grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-bottom: 20px;"></div>

        <!-- Bảng Bài Dịch (Hút từ Sheet) -->
        <div class="card">
            <h3>📌 Bài Lưu Chuẩn Bị Dịch (Hút từ Tab 'Queue' trên Sheet)</h3>
            <button onclick="fetchIdeasFromCloud()">📥 HÚT DỮ LIỆU TỪ SHEET</button>
            <table class="remote-table">
                <thead><tr><th>Link</th><th>Tiêu đề</th><th>N.Ngữ</th><th>Cre</th></tr></thead>
                <tbody id="list-ideas"></tbody>
            </table>
        </div>
    </div>

<script>
    // --- DÁN LINK VÀO ĐÂY ---
    const GOOGLE_SCRIPT_URL = "DÁN_LINK_WEB_APP_MỚI_VÀO_ĐÂY";

    // Dữ liệu dùng kho lưu trữ HY_WORKSPACE_DB và HY_RESOURCES_DB cố định
    let db = JSON.parse(localStorage.getItem('HY_WORKSPACE_DB')) || {};
    let resources = JSON.parse(localStorage.getItem('HY_RESOURCES_DB')) || { ideas_table: [] };
    let selectedDate = new Date();

    function saveDailyNote() {
        let key = formatDateKey(selectedDate);
        if(!db[key]) db[key] = { note: '' };
        db[key].note = document.getElementById('daily-note').value;
        localStorage.setItem('HY_WORKSPACE_DB', JSON.stringify(db));
        renderCalendar();
        saveToCloud('db', db);
    }

    function renderCalendar() {
        let grid = document.getElementById('calendar-grid'); grid.innerHTML = '';
        let m = selectedDate.getMonth(), y = selectedDate.getFullYear();
        let daysInMonth = new Date(y, m + 1, 0).getDate();
        for(let i=1; i<=daysInMonth; i++) {
            let d = new Date(y, m, i); let key = formatDateKey(d);
            let btn = document.createElement('button'); btn.className = 'cal-btn';
            if(db[key] && db[key].note) {
                btn.classList.add('has-note');
                btn.onmouseover = (e) => { 
                    let t = document.getElementById('sakura-tooltip'); t.innerText = `📝 ${db[key].note}`; 
                    t.style.display='block'; t.style.left = (e.pageX+10)+'px'; t.style.top = (e.pageY+10)+'px';
                };
                btn.onmouseout = () => document.getElementById('sakura-tooltip').style.display='none';
            }
            if(formatDateKey(selectedDate) === key) btn.classList.add('active');
            btn.innerHTML = `<span>${i}</span>`;
            btn.onclick = () => { selectedDate = d; renderCalendar(); loadNote(); };
            grid.appendChild(btn);
        }
    }

    function loadNote() {
        let key = formatDateKey(selectedDate);
        document.getElementById('daily-note').value = db[key] ? (db[key].note || '') : '';
        document.getElementById('note-date-text').innerText = key;
    }

    function formatDateKey(d) { return d.toISOString().split('T')[0]; }

    function fetchIdeasFromCloud() {
        fetch(GOOGLE_SCRIPT_URL + "?type=ideas")
        .then(res => res.json())
        .then(data => {
            resources.ideas_table = data;
            localStorage.setItem('HY_RESOURCES_DB', JSON.stringify(resources));
            renderIdeas();
        });
    }

    function renderIdeas() {
        let tbody = document.getElementById('list-ideas'); tbody.innerHTML = '';
        resources.ideas_table.forEach(item => {
            let tr = document.createElement('tr');
            tr.innerHTML = `<td><a href="${item.link}">Link</a></td><td>${item.title}</td><td>${item.lang}</td><td><button class="btn-copy-mini" onclick="navigator.clipboard.writeText('${item.cre}')">Copy Cre</button></td>`;
            tbody.appendChild(tr);
        });
    }

    function saveToCloud(type, data) {
        if(GOOGLE_SCRIPT_URL.includes("DÁN_LINK")) return;
        fetch(GOOGLE_SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ type: type, data: JSON.stringify(data) }) });
    }

    renderCalendar(); loadNote(); renderIdeas();
</script>
</body>
</html>
